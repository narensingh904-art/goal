<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Goals Dashboard</title><style>body{margin:0;background:#121212;color:#fff;font-family:Arial,sans-serif}.container{max-width:1200px;margin:auto;padding:20px}h1{text-align:center}#summary{
position:sticky;
top:0;
background:#121212;
padding:10px 0;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}
.card{
padding:15px;
cursor:pointer;
min-width:0;
}.card,.goal{background:#1e1e1e;border:1px solid #333;border-radius:18px}.card{padding:18px;cursor:pointer}.goal{margin:18px 0}.header{display:flex;justify-content:space-between;align-items:center;padding:18px;cursor:pointer}.content{display:none;padding:0 18px 18px}.days{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}.day{background:#171717;border:1px solid #444;border-radius:12px;padding:12px;text-align:center;cursor:pointer}.done{background:#2c2c2c}.current{border:2px solid #4A90E2;box-shadow:0 0 12px rgba(74,144,226,.35)}button{background:#2a2a2a;color:#fff;border:1px solid #555;border-radius:12px;padding:8px 14px;cursor:pointer}.actions{text-align:center;margin:25px 0}</style></head><body><div class="container"><h1>MY GOALS DASHBOARD</h1><div id="summary"></div><div id="goals"></div><div class="actions"><button onclick="exportData()">Export Backup</button> <button onclick="document.getElementById('imp').click()">Import Backup</button> <button onclick="resetAll()">Reset All</button><input id="imp" type="file" hidden></div><div id="updated"></div></div><script>let sessionUndo={};const defaults=[{name:'N4',total:188},{name:'English',total:278},{name:'Health',total:188},{name:'Skin',total:127}];let saved=JSON.parse(localStorage.getItem('goals')||'null');let goals=defaults.map(d=>{let o=saved?.find(x=>x.name===d.name);return {name:d.name,total:d.total,done:o?.done||[]}});const summary=document.getElementById('summary'),goalsDiv=document.getElementById('goals');function save(){localStorage.setItem('goals',JSON.stringify(goals));localStorage.setItem('updated',new Date().toLocaleString());render()}function render(){summary.innerHTML='';goalsDiv.innerHTML='';goals.forEach((g,i)=>{let p=((g.done.length/g.total)*100).toFixed(2),left=g.total-g.done.length;summary.innerHTML+=`<div class="card" onclick="document.getElementById('goal${i}').scrollIntoView({behavior:'smooth'})"><b>${g.name}</b><h2>${p}%</h2><div>${g.done.length} Done | ${left} Left</div></div>`;let days='';for(let d=1;d<=g.total;d++){let c=g.done.includes(d)?'done':'';if(d===g.done.length+1&&!g.done.includes(d))c+=' current';days+=`<div class="day ${c}" onclick="markDay(${i},${d})">${g.done.includes(d)?'✓ ':''}Day ${d}</div>`}goalsDiv.innerHTML+=`<div class="goal" id="goal${i}"><div class="header" onclick="toggle(${i})"><div>▶ <b>${g.name}</b><div>${p}% | ${g.done.length} Done | ${left} Left</div></div><button onclick="event.stopPropagation();undo(${i})">↶ Undo</button></div><div class="content" id="c${i}"><div class="days">${days}</div></div></div>`});updated.textContent='Last Updated: '+(localStorage.getItem('updated')||'Never')}function toggle(i){let e=document.getElementById('c'+i);e.style.display=e.style.display==='block'?'none':'block'}function markDay(i,d){if(goals[i].done.includes(d))return;goals[i].done.push(d);goals[i].done.sort((a,b)=>a-b);sessionUndo[i]=(sessionUndo[i]||0)+1;save()}function undo(i){if(!sessionUndo[i]){alert('No recent actions to undo.');return}goals[i].done.pop();sessionUndo[i]--;save()}function resetAll(){if(confirm('Reset all progress?')){goals.forEach(g=>g.done=[]);sessionUndo={};save()}}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(goals)]));a.download='goals-backup.json';a.click()}imp.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{goals=JSON.parse(r.result);save()};r.readAsText(f)};render();</script></body></html>
